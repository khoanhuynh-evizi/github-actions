name: Smoke Test Manual (-s)

permissions:
  contents: write   # 🔥 BẮT BUỘC để push gh-pages (Allure history)

on:
  workflow_dispatch:
    inputs:
      suite:
        description: 'Suite name'
        required: true
        default: 'Smoke Test'
      features:
        description: 'Feature (Optional)'
        required: false
        default: ''
      featureTestCases:
        description: 'Specific testcase (Optional)'
        required: false
        default: ''
      branch:
        description: 'Test branch'
        required: true
        default: 'master'

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  chrome-ubuntu:
    runs-on: ubuntu-latest

    steps:
    # =========================
    # CHECKOUT WDIO REPO
    # =========================
    - name: Checkout WDIO Repository
      uses: actions/checkout@v4
      with:
        repository: ${{ secrets.WDIO_REPOS }}
        token: ${{ secrets.WDIO_ACCESS_TOKEN }}
        ref: ${{ github.event.inputs.branch }}

    # =========================
    # 🔥 RESTORE ALLURE HISTORY (FROM gh-pages)
    # =========================
    # 👉 Lấy dữ liệu cũ để Allure vẽ Trend
    - name: Restore Allure history
      uses: actions/checkout@v4
      with:
        ref: gh-pages
        path: allure-history
      continue-on-error: true   # Run đầu chưa có history thì bỏ qua

    # =========================
    # NODE SETUP
    # =========================
    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: yarn
        cache-dependency-path: yarn.lock

    - name: Install dependencies
      run: yarn install --frozen-lockfile

    # =========================
    # RUN TEST
    # =========================
    - name: Run WebDriverIO Tests
      uses: StarUbiquitous/command-output@v1.0.1
      id: wdio
      with:
        run: |
          yarn test:local \
            --suite="${{ github.event.inputs.suite }}" \
            --features="${{ github.event.inputs.features }}" \
            --featureTestCases="${{ github.event.inputs.featureTestCases }}"
      env:
        CAPABILITIES: chrome
        MAX_INSTANCES: 2
        R360_DASHBOARD_URL: ${{ secrets.R360_DASHBOARD_URL_S }}

    # =========================
    # TEST CHECKER
    # =========================
    - name: WDIO Test Checker
      run: |
        cat > specs-reporter.log <<EOL
        ${{ steps.wdio.outputs.stdout }}
        EOL

        if grep -E '[0-9]+\sfailed,' specs-reporter.log; then
          exit 1
        fi

    # =========================
    # 🔥 GENERATE ALLURE REPORT (WITH HISTORY)
    # =========================
    # 👉 Step QUAN TRỌNG NHẤT để enable Trend
    - name: Generate Allure Report
      if: always()
      uses: simple-elf/allure-report-action@v1.13
      with:
        allure_results: reports
        allure_report: allure-report
        allure_history: allure-history   # 🔥 MUST HAVE

    # =========================
    # 🔥 PUBLISH ALLURE HISTORY
    # =========================
    # 👉 Publish ĐÚNG folder history (KHÔNG bọc thêm level)
    - name: Publish Allure history
      if: always()
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_branch: gh-pages
        publish_dir: allure-history/history   # 🔥 CHUẨN ALLURE

    # =========================
    # ARTIFACTS
    # =========================
    - name: Upload HTML Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-html
        path: allure-report/
        retention-days: 7

    - name: Upload Raw Allure Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-results
        path: reports/
        retention-days: 7

    # =========================
    # FIREBASE DEPLOY
    # =========================
    - name: Prepare deploy folder
      if: always()
      run: |
        mkdir -p deploy
        cp -r allure-report/* deploy/

    - name: Create firebase config
      if: always()
      run: |
        echo '{
          "hosting": {
            "public": "deploy",
            "ignore": ["firebase.json", "**/.*", "**/node_modules/**"]
          }
        }' > firebase.json

        echo '{
          "projects": {
            "default": "record360-report-s"
          }
        }' > .firebaserc

    - name: Set up Firebase credentials
      if: always()
      run: echo '${{ secrets.L_FIREBASE_SERVICE_ACCOUNT }}' > service-account.json

    - name: Deploy Allure Report to Firebase Hosting
      if: always()
      uses: w9jds/firebase-action@v13.27.0
      with:
        args: deploy --only hosting --project record360-report-s
      env:
        GOOGLE_APPLICATION_CREDENTIALS: service-account.json
