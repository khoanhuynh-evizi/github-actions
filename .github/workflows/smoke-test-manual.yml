name: Smoke Test Daily (-s)

on:
  schedule:
    - cron: '0 20 * * 0-4' # 03:00h every night UTC+7
  workflow_dispatch:
    inputs:
      suite:
        description: 'Suite name'
        required: true
        default: 'Smoke Test'
      features:
        description: 'Feature (Optional)'
        required: false
        default: ''
      featureTestCases:
        description: 'Specific testcase (Optional)'
        required: false
        default: ''
      branchWdio:
        description: 'Branch WDIO'
        required: false
        default: ''
      branchDashboard:
        description: 'Branch dashboard'
        required: false
        default: ''
      dashboardUrl:
        description: 'Dashboard URL (Optional)'
        required: false
        default: ''
      forceRun:
        description: 'Force run (skip commit check)'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  check-repos-commit:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}

    steps:
      - name: Check latest commits in WDIO & Dashboard repos
        id: check
        run: |

          WDIO_REPO="${{ secrets.WDIO_REPOS }}"
          DASHBOARD_REPO="${{ secrets.DASHBOARD_REPO }}"

          WDIO_TOKEN="${{ secrets.WDIO_ACCESS_TOKEN }}"
          DASHBOARD_TOKEN="${{ secrets.DASHBOARD_ACCESS_TOKEN }}"

          NOW_TS=$(date +%s)
          SHOULD_RUN_FILE=$(mktemp)
          echo "false" > "$SHOULD_RUN_FILE"

          check_repo () {
            REPO=$1
            BRANCH=$2
            TOKEN=$3

            echo "----------------------------------------"
            echo "Checking repo: $REPO"
            echo "Branch: $BRANCH"

            COMMIT_JSON=$(curl -s \
              -H "Authorization: token $TOKEN" \
              https://api.github.com/repos/$REPO/commits/$BRANCH)

            COMMIT_DATE=$(echo "$COMMIT_JSON" | jq -r '.commit.committer.date')
            COMMIT_SHA=$(echo "$COMMIT_JSON" | jq -r '.sha')

            if [ "$COMMIT_DATE" = "null" ] || [ -z "$COMMIT_DATE" ]; then
              echo "❌ Failed to fetch commit from $REPO/$BRANCH — check token & repo name"
              exit 1
            fi

            echo "Latest commit SHA: $COMMIT_SHA"
            echo "Latest commit date (UTC): $COMMIT_DATE"
            echo "Latest commit local time (UTC+7): $(TZ=Asia/Ho_Chi_Minh date -d "$COMMIT_DATE" '+%Y-%m-%d %H:%M:%S')"

            COMMIT_TS=$(date -d "$COMMIT_DATE" +%s)
            DIFF=$((NOW_TS - COMMIT_TS))

            HOURS=$((DIFF / 3600))

            echo "Seconds since last commit: $DIFF"
            echo "Hours since last commit: $HOURS h"

            if [ $DIFF -le 86400 ]; then
              echo "Commit within 24h → TEST WILL RUN"
              echo "true" > "$SHOULD_RUN_FILE"
            else
              echo "No commit in last 24h"
            fi
          }

          if [ "${{ github.event.inputs.forceRun }}" = "true" ]; then
            echo "forceRun=true → skipping commit check, TEST WILL RUN"
            echo "true" > "$SHOULD_RUN_FILE"
          else
            check_repo "$WDIO_REPO" "${{ github.event.inputs.branchWdio || secrets.DEFAULT_BRANCH_WDIO }}" "$WDIO_TOKEN"
            check_repo "$DASHBOARD_REPO" "${{ github.event.inputs.branchDashboard || secrets.DEFAULT_BRANCH_DASHBOARD }}" "$DASHBOARD_TOKEN"
          fi

          SHOULD_RUN=$(cat "$SHOULD_RUN_FILE")
          rm -f "$SHOULD_RUN_FILE"

          echo "----------------------------------------"
          echo "Final decision should_run=$SHOULD_RUN"

          echo "should_run=$SHOULD_RUN" >> $GITHUB_OUTPUT

  chrome-ubuntu:
    needs: check-repos-commit
    if: needs.check-repos-commit.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Ho_Chi_Minh

    steps:
    - name: Checkout workflow repo
      uses: actions/checkout@v4

    - name: Checkout WDIO repository
      uses: actions/checkout@v4
      with:
        repository: ${{ secrets.WDIO_REPOS }}
        token: ${{ secrets.WDIO_ACCESS_TOKEN }}
        ref: ${{ github.event.inputs.branchWdio || secrets.DEFAULT_BRANCH_WDIO }}
        path: wdio

    - name: Log WDIO branch info
      run: |
        echo "=========================================="
        echo "WDIO branch (input): ${{ github.event.inputs.branchWdio }}"
        echo "WDIO branch (resolved): $(cd wdio && git rev-parse --abbrev-ref HEAD)"
        echo "WDIO commit SHA: $(cd wdio && git rev-parse HEAD)"
        echo "WDIO commit message: $(cd wdio && git log -1 --pretty=%s)"
        echo "=========================================="

    - name: Free disk space
      run: |
        df -h
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /opt/ghc
        sudo rm -rf "$AGENT_TOOLSDIRECTORY"
        sudo apt-get clean
        df -h

    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: yarn
        cache-dependency-path: wdio/yarn.lock

    - name: Install dependencies
      run: yarn install --frozen-lockfile
      working-directory: wdio

    - name: Clean old reports
      run: rm -rf wdio/reports wdio/allure-report wdio/allure-history specs-reporter.log

    - name: Run WebDriverIO Tests
      id: wdio
      run: |
        cd wdio
        yarn test:local \
            --suite="${{ github.event.inputs.suite || 'Smoke Test'}}" \
            --features="${{ github.event.inputs.features }}" \
            --featureTestCases="${{ github.event.inputs.featureTestCases }}" \
          2>&1 | tee ../specs-reporter.log
      env:
        CAPABILITIES: chrome
        MAX_INSTANCES: 2
        R360_DASHBOARD_URL: ${{ github.event.inputs.dashboardUrl || secrets.R360_DASHBOARD_URL_ }}

    - name: WDIO Test Checker
      if: always()
      run: |
        if grep -qE "[0-9]+\s+failed" specs-reporter.log; then
          exit 1
        fi

    - name: Upload spec reporter log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: specs-reporter-log
        path: specs-reporter.log
        retention-days: 7

    - name: Get Allure history
      if: ${{ !cancelled() }}
      uses: actions/checkout@v4
      continue-on-error: true
      with:
        repository: ${{ secrets.WDIO_REPOS }}
        token: ${{ secrets.WDIO_ACCESS_TOKEN }}
        ref: allure-history
        path: report-history

    - name: Copy previous Allure history to reports (for trend graphs)
      if: ${{ !cancelled() }}
      run: |
        mkdir -p wdio/reports/history
        cp -r report-history/allure-history/last-history/. wdio/reports/history 2>/dev/null || \
        cp -r report-history/last-history/. wdio/reports/history 2>/dev/null || true

    - name: Create Allure environment.properties
      if: ${{ !cancelled() }}
      run: |
        mkdir -p wdio/reports
        cat > wdio/reports/environment.properties << 'ENVEOF'
        branch_auto=${{ github.event.inputs.branchWdio || secrets.DEFAULT_BRANCH_WDIO }}
        branch_code=${{ github.event.inputs.branchDashboard || secrets.DEFAULT_BRANCH_DASHBOARD }}
        ENVEOF

    - name: Generate Allure Report
      if: ${{ !cancelled() }}
      run: npx --yes allure-commandline@2.37.0 generate wdio/reports --clean -o wdio/allure-report

    - name: Save history for next run
      if: ${{ !cancelled() }}
      run: |
        mkdir -p allure-history-branch/allure-history
        cp -r wdio/allure-report/history allure-history-branch/allure-history/last-history

    - name: Push report history to branch
      if: ${{ !cancelled() }}
      uses: peaceiris/actions-gh-pages@v4
      with:
        personal_token: ${{ secrets.WDIO_ACCESS_TOKEN }}
        external_repository: ${{ secrets.WDIO_REPOS }}
        publish_branch: allure-history
        publish_dir: allure-history-branch

    - name: Prepare deploy folder
      if: ${{ !cancelled() }}
      run: |
        mkdir -p deploy
        cp -r wdio/allure-report/* deploy/

    - name: Upload Allure HTML
      if: ${{ !cancelled() }}
      uses: actions/upload-artifact@v4
      with:
        name: reports-html
        path: wdio/allure-report/
        retention-days: 7

    - name: Upload Allure raw results
      if: ${{ !cancelled() }}
      uses: actions/upload-artifact@v4
      with:
        name: reports-allure
        path: wdio/reports/
        retention-days: 7

    - name: Create firebase config
      if: ${{ !cancelled() }}
      run: |
        echo '{
          "hosting": {
            "public": "deploy",
            "ignore": ["firebase.json", "**/.*", "**/node_modules/**"],
            "limit": 3
          }
        }' > firebase.json

        echo '{
          "projects": {
            "default": "record360-report"
          }
        }' > .firebaserc

    - name: Set up Firebase credentials
      if: ${{ !cancelled() }}
      run: echo '${{ secrets.CHINH_FIREBASE_SERVICE_ACCOUNT }}' > $GITHUB_WORKSPACE/service-account.json

    - name: Deploy Allure Report to Firebase Hosting
      if: ${{ !cancelled() }}
      uses: w9jds/firebase-action@v13.27.0
      with:
        args: deploy --only hosting --project record360-report
      env:
        GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/service-account.json

    - name: Parse Spec Reporter Result
      if: ${{ !cancelled() }}
      run: |
        LOG=specs-reporter.log
        if ! grep -q "Spec Files:" "$LOG"; then
          echo "TOTAL=0" >> $GITHUB_ENV
          echo "PASSED=0" >> $GITHUB_ENV
          echo "FAILED=0" >> $GITHUB_ENV
          echo "SKIPPED=0" >> $GITHUB_ENV
          echo "RETRIES=0" >> $GITHUB_ENV
          echo "DURATION=00:00:00" >> $GITHUB_ENV
          exit 0
        fi

        LINE=$(grep "Spec Files:" "$LOG" | tail -1)

        PASSED=$(echo "$LINE" | grep -oP '\d+(?=\s+passed)' || echo 0)
        RETRIES=$(echo "$LINE" | grep -oP '\d+(?=\s+retries)' || echo 0)
        FAILED=$(echo "$LINE" | grep -oP '\d+(?=\s+failed)' || echo 0)
        SKIPPED=$(echo "$LINE" | grep -oP '\d+(?=\s+skipped)' || echo 0)
        TOTAL=$(echo "$LINE" | grep -oP '\d+(?=\s+total)' || echo 0)
        DURATION=$(echo "$LINE" | grep -oP '\d{2}:\d{2}:\d{2}' || echo "00:00:00")

        PASS_RATE=$(( PASSED * 100 / (TOTAL - SKIPPED)))

        echo "TOTAL=$TOTAL" >> $GITHUB_ENV
        echo "PASSED=$PASSED" >> $GITHUB_ENV
        echo "FAILED=$FAILED" >> $GITHUB_ENV
        echo "SKIPPED=$SKIPPED" >> $GITHUB_ENV
        echo "RETRIES=$RETRIES" >> $GITHUB_ENV
        echo "PASS_RATE=$PASS_RATE" >> $GITHUB_ENV
        echo "DURATION=$DURATION" >> $GITHUB_ENV

    # ─────────────────────────────────────────────────────────────────────────
    # EXPORT FAILED TEST CASES TO GOOGLE SHEETS
    # ─────────────────────────────────────────────────────────────────────────
    - name: Export Failed Test Cases to Google Sheets
      if: ${{ !cancelled() && env.FAILED != '0' }}
      run: |
        pip install --quiet google-auth google-auth-httplib2 google-api-python-client

        python3 << 'PYEOF'
        import os, re, json, datetime
        from google.oauth2 import service_account
        from googleapiclient.discovery import build

        # ── Config ────────────────────────────────────────────────────────────
        SA_JSON     = os.environ["GSHEET_SERVICE_ACCOUNT"]
        SPREADSHEET = os.environ["GSHEET_SPREADSHEET_ID"]
        LOG_PATH    = "specs-reporter.log"
        SCOPES      = ["https://www.googleapis.com/auth/spreadsheets"]

        # ── Auth ──────────────────────────────────────────────────────────────
        creds   = service_account.Credentials.from_service_account_info(
                      json.loads(SA_JSON), scopes=SCOPES)
        service = build("sheets", "v4", credentials=creds)
        sheets  = service.spreadsheets()

        # ── Parse failed test cases grouped by feature ────────────────────────
        prefix_re   = re.compile(r'^\[.*?\]\s*')
        spec_re     = re.compile(r'^»\s+\S+\.spec\.ts')
        cross_re    = re.compile(r'[✖✗×]\s+([\w]+-\d+[^@\n]*)')
        numbered_re = re.compile(r'^\s*\d+\)\s+.*?([\w]+-\d+[^@\[\n]*)')

        def clean_label(raw):
            label = re.sub(r'\s*\[.*', '', raw).strip().rstrip(':').strip()
            return label

        raw_lines = []
        if os.path.exists(LOG_PATH):
            with open(LOG_PATH, encoding="utf-8", errors="replace") as fh:
                for line in fh:
                    raw_lines.append(prefix_re.sub('', line).rstrip('\n'))

        blocks, current = [], []
        for line in raw_lines:
            if spec_re.match(line.strip()):
                if current:
                    blocks.append(current)
                current = [line]
            else:
                current.append(line)
        if current:
            blocks.append(current)

        # Keep only the last retry block per spec file
        spec_last = {}
        for block in blocks:
            spec_last[block[0].strip()] = block

        # Collect spec filenames that ultimately PASSED (including after retries)
        # Match both "PASSED in chrome - file:///..." and "PASSED in chrome - /src/..."
        passed_re = re.compile(r'PASSED in \S+ - \S+/([^/]+\.spec\.ts)')
        ultimately_passed = set()
        for line in raw_lines:
            m = passed_re.search(line)
            if m:
                ultimately_passed.add(m.group(1))

        from collections import OrderedDict
        feature_map = OrderedDict()

        for spec_key, block in spec_last.items():
            # Skip spec files that ultimately passed (even after retries)
            # Extract just the filename from the spec block header line
            spec_file_m = re.search(r'/([^/]+\.spec\.ts)', spec_key)
            if spec_file_m and spec_file_m.group(1) in ultimately_passed:
                continue
            feature_name    = None
            failed_in_block = []
            seen_tc         = set()
            lines           = block[1:]

            for line in lines:
                stripped = line.strip()
                if not stripped:
                    continue
                if stripped.startswith(('[', '✖', '✗', '×', '-', '.')):
                    continue
                if re.match(r'^[\w]+-\d+', stripped) or re.match(r'^\d+\)', stripped):
                    continue
                feature_name = stripped
                break

            if not feature_name:
                m = re.search(r'/([^/]+)\.spec\.ts', spec_key)
                feature_name = m.group(1).replace('-', ' ').replace('_', ' ').title() if m else "Unknown"

            for line in lines:
                m = cross_re.search(line)
                if m:
                    label = clean_label(m.group(1))
                    if label and label not in seen_tc:
                        seen_tc.add(label)
                        failed_in_block.append(label)

            if failed_in_block:
                if feature_name not in feature_map:
                    feature_map[feature_name] = []
                for tc in failed_in_block:
                    if tc not in feature_map[feature_name]:
                        feature_map[feature_name].append(tc)

        if not feature_map:
            print("No failed test cases found — skipping Google Sheets export.")
            raise SystemExit(0)

        total_failed = sum(len(v) for v in feature_map.values())
        print(f"Found {total_failed} failed test case(s) across {len(feature_map)} feature(s):")
        for feat, tcs in feature_map.items():
            print(f"  [{feat}]")
            for tc in tcs:
                print(f"    • {tc}")

        # ── Resolve target sheet name (MM/DD or MM/DD-2, MM/DD-3 …) ──────────
        tz        = datetime.timezone(datetime.timedelta(hours=7))
        today     = datetime.datetime.now(tz)
        base_name = today.strftime("%m/%d")

        meta     = sheets.get(spreadsheetId=SPREADSHEET).execute()
        existing = {s["properties"]["title"] for s in meta["sheets"]}

        sheet_name = base_name
        idx = 2
        while sheet_name in existing:
            sheet_name = f"{base_name}-{idx}"
            idx += 1

        # ── Build row data ────────────────────────────────────────────────────
        # Columns: A=TCs | B=Run | C=Type | D=Status | E=Note | F-Z=empty
        TOTAL_COLS = 26
        EMPTY      = [""] * (TOTAL_COLS - 5)

        header_row          = ["TCs", "Run", "Type", "Status", "Note"] + EMPTY
        all_rows            = [header_row]
        feature_row_indices = []   # 0-based row indices for feature header rows
        tc_row_indices      = []   # 0-based row indices for TC data rows

        for feat_name, tcs in feature_map.items():
            feature_row_indices.append(len(all_rows))
            all_rows.append([feat_name] + [""] * (TOTAL_COLS - 1))
            for tc in tcs:
                tc_row_indices.append(len(all_rows))
                # B=True (boolean) → becomes checked checkbox after validation applied
                all_rows.append([tc, True, "Existing", "Fail", ""] + EMPTY)

        total_rows = len(all_rows)

        # ── Create the new sheet ──────────────────────────────────────────────
        resp = sheets.batchUpdate(
            spreadsheetId=SPREADSHEET,
            body={"requests": [{"addSheet": {"properties": {
                "title": sheet_name,
                "gridProperties": {
                    "rowCount": max(200, total_rows + 10),
                    "columnCount": TOTAL_COLS
                }
            }}}]}
        ).execute()
        new_sheet_id = resp["replies"][0]["addSheet"]["properties"]["sheetId"]
        print(f"Created sheet: '{sheet_name}' (id={new_sheet_id})")

        # ── Helper ────────────────────────────────────────────────────────────
        def cr(r1, c1, r2, c2):
            return {"sheetId": new_sheet_id,
                    "startRowIndex": r1, "endRowIndex": r2,
                    "startColumnIndex": c1, "endColumnIndex": c2}

        # ── Colors ────────────────────────────────────────────────────────────
        DARK_BG   = {"red": 0.2,   "green": 0.2,   "blue": 0.2}
        YELLOW_BG = {"red": 1.0,   "green": 0.949, "blue": 0.0}
        RED_BG    = {"red": 0.863, "green": 0.196,  "blue": 0.184}
        GREEN_BG  = {"red": 0.118, "green": 0.588,  "blue": 0.235}
        GRAY_BG   = {"red": 0.851, "green": 0.851,  "blue": 0.851}  # #D9D9D9 – Type chip
        WHITE     = {"red": 1.0,   "green": 1.0,    "blue": 1.0}
        BLACK     = {"red": 0.0,   "green": 0.0,    "blue": 0.0}

        # ─────────────────────────────────────────────────────────────────────
        # STEP 1 — Apply all cell formatting (repeatCell) in one batchUpdate
        # ─────────────────────────────────────────────────────────────────────
        fmt_requests = []

        # 1a. Header row: dark background, white bold text, centered
        fmt_requests.append({
            "repeatCell": {
                "range": cr(0, 0, 1, TOTAL_COLS),
                "cell": {"userEnteredFormat": {
                    "backgroundColor": DARK_BG,
                    "textFormat": {"bold": True, "foregroundColor": WHITE, "fontSize": 10},
                    "horizontalAlignment": "CENTER",
                    "verticalAlignment": "MIDDLE"
                }},
                "fields": "userEnteredFormat(backgroundColor,textFormat,horizontalAlignment,verticalAlignment)"
            }
        })

        # 1b. Feature header rows: yellow background, bold black text, left-aligned
        for r in feature_row_indices:
            fmt_requests.append({
                "repeatCell": {
                    "range": cr(r, 0, r + 1, TOTAL_COLS),
                    "cell": {"userEnteredFormat": {
                        "backgroundColor": YELLOW_BG,
                        "textFormat": {"bold": True, "foregroundColor": BLACK, "fontSize": 10},
                        "horizontalAlignment": "LEFT",
                        "verticalAlignment": "MIDDLE"
                    }},
                    "fields": "userEnteredFormat(backgroundColor,textFormat,horizontalAlignment,verticalAlignment)"
                }
            })

        if tc_row_indices:
            first_tc = tc_row_indices[0]
            last_tc  = tc_row_indices[-1] + 1

            # 1c. Column B (Run): center-align for checkbox display
            fmt_requests.append({
                "repeatCell": {
                    "range": cr(first_tc, 1, last_tc, 2),
                    "cell": {"userEnteredFormat": {
                        "horizontalAlignment": "CENTER",
                        "verticalAlignment": "MIDDLE"
                    }},
                    "fields": "userEnteredFormat(horizontalAlignment,verticalAlignment)"
                }
            })

            # 1d. Column C (Type): center-align only — background set via conditional format
            #     so Google Sheets renders the native chip/rounded style
            fmt_requests.append({
                "repeatCell": {
                    "range": cr(first_tc, 2, last_tc, 3),
                    "cell": {"userEnteredFormat": {
                        "horizontalAlignment": "CENTER",
                        "verticalAlignment": "MIDDLE"
                    }},
                    "fields": "userEnteredFormat(horizontalAlignment,verticalAlignment)"
                }
            })

            # 1e. Column D (Status): center-align only — background set via conditional format
            fmt_requests.append({
                "repeatCell": {
                    "range": cr(first_tc, 3, last_tc, 4),
                    "cell": {"userEnteredFormat": {
                        "horizontalAlignment": "CENTER",
                        "verticalAlignment": "MIDDLE"
                    }},
                    "fields": "userEnteredFormat(horizontalAlignment,verticalAlignment)"
                }
            })

        sheets.batchUpdate(spreadsheetId=SPREADSHEET,
                           body={"requests": fmt_requests}).execute()
        print("✅ Cell formatting applied.")

        # ─────────────────────────────────────────────────────────────────────
        # STEP 2 — Apply data validation (checkbox + dropdowns) separately
        # ─────────────────────────────────────────────────────────────────────
        if tc_row_indices:
            first_tc = tc_row_indices[0]
            last_tc  = tc_row_indices[-1] + 1

            val_requests = [
                # B: BOOLEAN → renders as checkbox (showCustomUi:true)
                {
                    "setDataValidation": {
                        "range": cr(first_tc, 1, last_tc, 2),
                        "rule": {
                            "condition": {"type": "BOOLEAN"},
                            "showCustomUi": True,
                            "strict": True
                        }
                    }
                },
                # C: dropdown Existing / New Feature
                {
                    "setDataValidation": {
                        "range": cr(first_tc, 2, last_tc, 3),
                        "rule": {
                            "condition": {
                                "type": "ONE_OF_LIST",
                                "values": [
                                    {"userEnteredValue": "Existing"},
                                    {"userEnteredValue": "New Feature"}
                                ]
                            },
                            "showCustomUi": True,
                            "strict": True
                        }
                    }
                },
                # D: dropdown Fail / Pass — CHIP style = rounded pill
                {
                    "setDataValidation": {
                        "range": cr(first_tc, 3, last_tc, 4),
                        "rule": {
                            "condition": {
                                "type": "ONE_OF_LIST",
                                "values": [
                                    {"userEnteredValue": "Fail"},
                                    {"userEnteredValue": "Pass"}
                                ]
                            },
                            "showCustomUi": True,
                            "strict": True
                        }
                    }
                }
            ]
            sheets.batchUpdate(spreadsheetId=SPREADSHEET,
                               body={"requests": val_requests}).execute()
            print("✅ Data validation applied.")

        # ─────────────────────────────────────────────────────────────────────
        # STEP 3 — Conditional formatting for all dropdown values
        #          This is what triggers Google Sheets native chip/rounded style
        # ─────────────────────────────────────────────────────────────────────
        if tc_row_indices:
            first_tc = tc_row_indices[0]
            last_tc  = tc_row_indices[-1] + 1

            cond_requests = [
                # Column C — Type: "Existing" → gray chip
                {
                    "addConditionalFormatRule": {
                        "rule": {
                            "ranges": [cr(first_tc, 2, last_tc, 3)],
                            "booleanRule": {
                                "condition": {
                                    "type": "TEXT_EQ",
                                    "values": [{"userEnteredValue": "Existing"}]
                                },
                                "format": {
                                    "backgroundColor": GRAY_BG,
                                    "textFormat": {"bold": True, "foregroundColor": BLACK}
                                }
                            }
                        },
                        "index": 0
                    }
                },
                # Column C — Type: "New Feature" → blue chip
                {
                    "addConditionalFormatRule": {
                        "rule": {
                            "ranges": [cr(first_tc, 2, last_tc, 3)],
                            "booleanRule": {
                                "condition": {
                                    "type": "TEXT_EQ",
                                    "values": [{"userEnteredValue": "New Feature"}]
                                },
                                "format": {
                                    "backgroundColor": {"red": 0.643, "green": 0.761, "blue": 0.957},
                                    "textFormat": {"bold": True, "foregroundColor": BLACK}
                                }
                            }
                        },
                        "index": 1
                    }
                },
                # Column D — Status: "Fail" → red chip
                {
                    "addConditionalFormatRule": {
                        "rule": {
                            "ranges": [cr(first_tc, 3, last_tc, 4)],
                            "booleanRule": {
                                "condition": {
                                    "type": "TEXT_EQ",
                                    "values": [{"userEnteredValue": "Fail"}]
                                },
                                "format": {
                                    "backgroundColor": RED_BG,
                                    "textFormat": {"bold": True, "foregroundColor": WHITE}
                                }
                            }
                        },
                        "index": 2
                    }
                },
                # Column D — Status: "Pass" → green chip
                {
                    "addConditionalFormatRule": {
                        "rule": {
                            "ranges": [cr(first_tc, 3, last_tc, 4)],
                            "booleanRule": {
                                "condition": {
                                    "type": "TEXT_EQ",
                                    "values": [{"userEnteredValue": "Pass"}]
                                },
                                "format": {
                                    "backgroundColor": GREEN_BG,
                                    "textFormat": {"bold": True, "foregroundColor": WHITE}
                                }
                            }
                        },
                        "index": 3
                    }
                }
            ]
            sheets.batchUpdate(spreadsheetId=SPREADSHEET,
                               body={"requests": cond_requests}).execute()
            print("✅ Conditional formatting applied.")

        # ─────────────────────────────────────────────────────────────────────
        # STEP 4 — Write all row data
        # Writing AFTER validation so boolean True renders as checked checkbox
        # ─────────────────────────────────────────────────────────────────────
        sheets.values().update(
            spreadsheetId=SPREADSHEET,
            range=f"'{sheet_name}'!A1",
            valueInputOption="RAW",
            body={"values": all_rows}
        ).execute()
        print("✅ Data written.")

        # ─────────────────────────────────────────────────────────────────────
        # STEP 5 — Final touches: auto-resize A-E + freeze header row
        # ─────────────────────────────────────────────────────────────────────
        sheets.batchUpdate(spreadsheetId=SPREADSHEET, body={"requests": [
            {
                "autoResizeDimensions": {
                    "dimensions": {
                        "sheetId": new_sheet_id,
                        "dimension": "COLUMNS",
                        "startIndex": 0,
                        "endIndex": 5
                    }
                }
            },
            {
                "updateSheetProperties": {
                    "properties": {
                        "sheetId": new_sheet_id,
                        "gridProperties": {"frozenRowCount": 1}
                    },
                    "fields": "gridProperties.frozenRowCount"
                }
            }
        ]}).execute()
        print("✅ Auto-resize and freeze applied.")

        print(f"\n🎉 Exported {total_failed} failed test case(s) to sheet '{sheet_name}'.")
        PYEOF
      env:
        GSHEET_SERVICE_ACCOUNT: ${{ secrets.L_GSHEET_SERVICE_ACCOUNT }}
        GSHEET_SPREADSHEET_ID:  ${{ secrets.L_GSHEET_SPREADSHEET_ID }}

    - name: Notify Google Chat
      if: ${{ !cancelled() }}
      run: |
        STATUS="PASSED"
        STATUS_COLOR="#0F9D58"
        STATUS_ICON="✅"

        if [ "${{ job.status }}" != "success" ]; then
          STATUS="FAILED"
          STATUS_COLOR="#DB4437"
          STATUS_ICON="❌"
        fi

        export STATUS STATUS_COLOR STATUS_ICON
        export DATE_TIME="$(date '+%d/%m/%Y %H:%M:%S')"
        export REPORT_URL="https://record360-report.web.app"
        export GSHEET_URL="https://docs.google.com/spreadsheets/d/${{ secrets.L_GSHEET_SPREADSHEET_ID }}/edit"
        export BRANCH_WDIO="${{ github.event.inputs.branchWdio || secrets.DEFAULT_BRANCH_WDIO }}"
        export BRANCH_DASHBOARD="${{ github.event.inputs.branchDashboard || secrets.DEFAULT_BRANCH_DASHBOARD }}"

        envsubst < .github/googleChat/dashboard-card.json > payload.json

        curl -X POST "${{ secrets.GCHAT_WEBHOOK }}" \
          -H "Content-Type: application/json" \
          -d @payload.json